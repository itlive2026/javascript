<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Kundalik</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            width: 500px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }

        select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
        }

        button {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #27ae60;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #3498db;
        }

        .delete-btn {
            background: #e74c3c;
            padding: 4px 8px;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .clear-all {
            width: 100%;
            background: #95a5a6;
            margin-top: 10px;
        }

        .clear-all:hover {
            background: #7f8c8d;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <h2>🚀 Smart Kundalik</h2>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Bugungi rejangiz...">
            <select id="moodSelect">
                <option value="😊">😊 Quvnoq</option>
                <option value="😐">😐 Oddiy</option>
                <option value="🔥">🔥 Motivatsiyalangan</option>
                <option value="😴">😴 Charchagan</option>
            </select>
            <button id="addBtn">Qo'shish</button>
        </div>

        <ul id="taskList"></ul>
        <button id="clearAllBtn" class="clear-all">Hammasini o'chirish</button>
    </div>
<script>
    // Dom elementlarini ushlab olamiz
const taskInput = document.getElementById('taskInput');
const moodSelect = document.getElementById('moodSelect');
const addBtn = document.getElementById('addBtn');
const taskList = document.getElementById('taskList');
const clearAllBtn = document.getElementById('clearAllBtn');

// 1. LocalStorage'dan ma'lumotlarni o'qiymiz (agar bo'sh bo'lsa, [] bo'sh massiv qaytadi)
let myTasks = JSON.parse(localStorage.getItem('savedTasks')) || [];

// 2. Vazifalarni ekranga chiqarish funksiyasi
function renderTasks() {
    taskList.innerHTML = ""; // Ro'yxatni tozalash
    
    myTasks.forEach((task) => {
        const li = document.createElement('li');
        
        // Li ichiga matn, emoji va o'chirish tugmasini joylaymiz
        li.innerHTML = `
            <span>${task.mood} ${task.text}</span>
            <button class="delete-btn" onclick="deleteTask(${task.id})">O'chirish</button>
        `;
        
        taskList.appendChild(li);
    });
}

// 3. Yangi vazifa qo'shish
addBtn.addEventListener('click', () => {
    const taskText = taskInput.value.trim();
    const selectedMood = moodSelect.value;

    if (taskText === "") {
        alert("Iltimos, rejangizni yozing!");
        return;
    }

    // Har bir vazifa uchun unikal obyekt yaratamiz
    const newTask = {
        id: Date.now(), // unikal ID berish uchun vaqtdan foydalanamiz
        text: taskText,
        mood: selectedMood
    };

    // Massivga qo'shamiz
    myTasks.push(newTask);

    // Xotirani yangilaymiz (JSON.stringify orqali massivni matnga o'giramiz)
    localStorage.setItem('savedTasks', JSON.stringify(myTasks));

    // Ekranni yangilaymiz va inputni tozalaymiz
    renderTasks();
    taskInput.value = "";
});

// 4. Bitta vazifani ID bo'yicha o'chirish funksiyasi
function deleteTask(id) {
    // O'chirilgan ID dan boshqa hamma elementlarni qoldiramiz (filter qilamiz)
    myTasks = myTasks.filter(task => task.id !== id);
    
    // LocalStorage'ni yangilaymiz
    localStorage.setItem('savedTasks', JSON.stringify(myTasks));
    
    // Ekranda qayta ko'rsatamiz
    renderTasks();
}

// 5. Hammasini tozalash tugmasi
clearAllBtn.addEventListener('click', () => {
    if(confirm("Rostdan ham barcha rejalarni o'chirmoqchimisiz?")) {
        localStorage.removeItem('savedTasks'); // Xotiradan o'chirish
        myTasks = []; // Massivni bo'shatish
        renderTasks(); // Ekranni tozalash
    }
});

// Dastur ilk bor ishga tushganda eski ma'lumotlarni ko'rsatish
renderTasks();
</script>
</body>

</html>
