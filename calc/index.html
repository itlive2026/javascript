<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqlli Kalkulyator</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f3f4f6;
            display: flex;
            justify-content: center;
            padding: 40px;
            gap: 20px;
        }

        .calc-box {
            background: #1f2937;
            padding: 20px;
            border-radius: 12px;
            width: 260px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .display {
            width: 100%;
            height: 50px;
            background: #374151;
            border: none;
            border-radius: 6px;
            margin-bottom: 15px;
            color: white;
            font-size: 24px;
            text-align: right;
            padding: 5px 10px;
            box-sizing: border-box;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #4b5563;
            color: white;
        }

        button.action {
            background: #f59e0b;
        }

        button.equal {
            background: #10b981;
        }

        button.clear {
            background: #ef4444;
        }

        .history-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 250px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .history-list {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-list li {
            padding: 8px;
            border-bottom: 1px solid #e5e7eb;
            color: #374151;
            font-size: 14px;
        }

        .clear-history {
            background: #6b7280;
            font-size: 12px;
            padding: 5px;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <!-- Kalkulyator -->
    <div class="calc-box">
        <input type="text" id="display" class="display" readonly value="0">
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="action" onclick="press('/')">/</button>
            <button class="action" onclick="press('*')">*</button>
            <button class="action" onclick="press('-')">-</button>

            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button class="action" onclick="press('+')">+</button>

            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button class="equal" onclick="calculate()">=</button>

            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button onclick="press('0')">0</button>
        </div>
    </div>

    <!-- Tarix paneli -->
    <div class="history-box">
        <h3>📜 Amallar Tarixi</h3>
        <ul id="historyList" class="history-list"></ul>
        <button class="clear-history" onclick="clearHistory()">Tarixni tozalash</button>
    </div>

    <script>
        const display=document.getElementById("display");
        const histortList= document.getElementById("historyList")
        let calcHistory=JSON.parse(localStorage.getItem("myCalcHistory")) || [];
        let isResultDisplayed=false;
        function press(num){
            if (display.value ==="0" || isResultDisplayed){
                display.value=num;
                isResultDisplayed=false;
                    }
            else{
                display.value+=num;
            }
        }
        function clearDisplay(){
            display.value="0";
        }

        function calculate(){
            try{
                const expression=display.value;
                const result=eval(expression);
                display.value=result;
                isResultDisplayed=true;
                                    //23+23=46
                const historyItem=`${expression}=${result}`;
                calcHistory.unshift(historyItem);
                localStorage.setItem("myCalcHistory",JSON.stringify(calcHistory))
                renderHistory();

            }
            catch{
                display.value="Xatolik!";
                isResultDisplayed=true;
            }
        }
        function renderHistory(){
            histortList.innerHTML="";
            calcHistory.forEach(
                item=>{
                    const li = document.createElement("li");
                    li.textContent=item;
                    histortList.appendChild(li)
                }
            )
        }
        renderHistory();
        function clearHistory(){
            localStorage.removeItem("myCalcHistory");
            calcHistory=[];
            renderHistory();
        }


    </script>
</body>

</html>
