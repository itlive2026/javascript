<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Sodda Slider</title>
<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f0f2f5;
    margin: 0;
    font-family: sans-serif;
}

.slider-container {
    text-align: center;
}

#image_1 {
    width: 500px;
    height: 300px;
    border-radius: 12px;
    object-fit: cover;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* Tugmalar joylashuvi */
.buttons-container {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 30px; /* Tugmalar orasidagi masofa */
}

/* Yumaloq tugmalar stili */
.btn {
    width: 50px;
    height: 50px;
    border-radius: 50%; /* Tugmani mutlaqo yumaloq qiladi */
    border: none;
    background-color: #007bff;
    color: white;
    font-size: 20px;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    background-color: #0056b3;
    transform: scale(1.1); /* Sifatli ko'rinish uchun biroz kattalashadi */
}
</style>
</head>

<body>

    <div class="slider-container">
        <img id="image_1" src="https://picsum.photos/id/10/500/300" alt="Slider rasm">

        <div class="buttons-container">
            <button id="btn-prev" class="btn">←</button>
            <button id="btn-next" class="btn">→</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

<script>
let rasm = document.querySelector("#image_1");
let btnPrev = document.querySelector("#btn-prev");
let btnNext = document.querySelector("#btn-next");


let rasmlar = [
    "https://picsum.photos/id/10/500/300",
    "https://picsum.photos/id/20/500/300",
    "https://picsum.photos/id/30/500/300",
    "https://picsum.photos/id/40/500/300"
];


let index = 0;


btnNext.addEventListener("click", () => {
    index++; 
    
   
    if (index >= rasmlar.length) {
        index = 0;
    }
    
    
    rasm.setAttribute("src", rasmlar[index]);
});

btnPrev.addEventListener("click", () => {
    index--; 
    
    if (index < 0) {
        index = rasmlar.length - 1;
    }
    
    // Rasmning src atributini yangilaymiz
    rasm.setAttribute("src", rasmlar[index]);
});
</script>
</html>
